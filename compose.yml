networks:
  default:
     driver: bridge
     ipam:
       driver: default
       config:
         - subnet: 172.18.0.0/16
           gateway: 172.18.0.1
  front_network:
     driver: bridge
     ipam:
       driver: default
       config:
         - subnet: 172.19.0.0/16
           gateway: 172.19.0.1
  app_network:
     driver: bridge
     ipam:
       driver: default
       config:
         - subnet: 172.20.0.0/16
           gateway: 172.20.0.1
  db_network:
     driver: bridge
     ipam:
       driver: default
       config:
         - subnet: 172.21.0.0/16
           gateway: 172.21.0.1
  es_network:
     driver: bridge
     ipam:
       driver: default
       config:
         - subnet: 172.22.0.0/16
           gateway: 172.22.0.1
  backend_network:
     driver: bridge
     ipam:
       driver: default
       config:
         - subnet: 172.24.0.0/16
           gateway: 172.24.0.1