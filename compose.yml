include:
  # ------------------------------------
  # DB:MySQL(172.21.0.3)
  # ------------------------------------
  - path: ./docker/db/mysql/compose.yml
    env_file: ./docker/db/mysql/mysql-server-variables.env
  # ------------------------------------
  # Elasticsearch(172.22.0.2)
  # Kibana(172.22.0.3)
  # - path: ./docker/elasticsearch/compose.yml
  #   env_file: ./docker/elasticsearch/es-server-variables.env
  # ------------------------------------
  # END OF INCLUDE
  # ------------------------------------
services:
  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    ports:
      - 9000:9000
      - 9443:9443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/docker/portainer_data:/data
    restart: always

  serena-mcp:
    build:
      context: ./docker/serena_mcp
    container_name: serena_mcp
    network_mode: "bridge"
    restart: unless-stopped
    ports:
      - "24282:24282"           # Serena ダッシュボード
      - "32000:32000"           # ← LM Studio/HTTP クライアント用 (任意の空きポート)
    environment:
      - TZ=Asia/Tokyo
      - SERENA_DOCKER=1
      - SERENA_DASHBOARD_PORT=24282
      - DOTNET_VERSION=9.0
      - GO_VERSION=1.24.4
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${PWD}/docker/serena_mcp/serena_data:/workspaces/serena/config
      - ${PWD}/pdev:/workspaces/pdev
    stdin_open: true
    tty: true
    command:
      - "serena"
      - "start-mcp-server"
      - "--context"
      - "ide-assistant"
      - "--project"
      - "/workspaces/pdev"
      - "--port"
      - "32000"
      - "--host"
      - "0.0.0.0"
      - "--transport"
      - "streamable-http"  # HTTP で待ち受けるように指定 (
    # command:
    #   - "serena"
    #   - "start-mcp-server"
    #   - "--context"
    #   - "ide-assistant"
    #   - "--project"
    #   - "/workspaces/pdev"
    #   - "--port"
    #   - "32000"
  
  # serena-mcp:
  #   build: 
  #     context: ./docker/serena_mcp
  #   container_name: serena_mcp
  #   network_mode: "bridge"
  #   restart: unless-stopped
